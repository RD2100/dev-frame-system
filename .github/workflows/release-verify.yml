name: Release Verify

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-verify:
    name: Release verification
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install release gate dependencies
        shell: pwsh
        run: python -m pip install -e ".\packages\control-plane[dev]" -e ".\packages\ai-workflow-hub[dev]"

      - name: Run release gate
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\verify-release.ps1
